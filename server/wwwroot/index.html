<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QuizNet+</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main>
    <section id="login" class="panel">
      <h1>QuizNet+</h1>
      <input id="nickname" placeholder="Nickname">
      <button id="joinBtn">Vào lobby</button>
    </section>

    <section id="lobby" class="hidden">
      <header>
        <h2>Lobby</h2>
        <span id="me"></span>
      </header>

      <div class="grid">
        <div class="panel">
          <h3>Tạo phòng</h3>
          <input id="roomName" placeholder="Tên phòng">
          <select id="questionSet"></select>
          <button id="createRoomBtn">Tạo phòng</button>
        </div>

        <div class="panel">
          <h3>Danh sách phòng</h3>
          <div id="rooms"></div>
        </div>

        <div class="panel">
          <h3>Online</h3>
          <div id="players"></div>
        </div>
      </div>
    </section>

    <section id="room" class="hidden">
      <header>
        <h2 id="roomTitle">Room</h2>
        <button id="leaveBtn">Rời phòng</button>
      </header>

      <div class="grid">
        <div class="panel">
          <h3>Người chơi</h3>
          <div id="roomPlayers"></div>
          <button id="startBtn">Start game</button>
        </div>

        <div class="panel quiz">
          <div id="gameInfo"></div>
          <h3 id="question">Chờ host bắt đầu...</h3>
          <div id="answers"></div>
          <div id="scoreboard"></div>
        </div>

        <div class="panel">
          <h3>Chat</h3>
          <div id="chatLog"></div>
          <div class="row">
            <input id="chatInput" placeholder="Nhắn tin">
            <button id="sendChatBtn">Gửi</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
